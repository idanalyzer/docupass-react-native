name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    # The TypeScript surface is checked here. The native halves (Android Kotlin /
    # iOS Swift) build against the published native cores (com.idanalyzer:docupass
    # AAR / DocuPass pod) — wire a full native build once those are published.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: TypeScript typecheck
        run: npx tsc --noEmit
