name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify npm package contents
        run: npm pack --dry-run
