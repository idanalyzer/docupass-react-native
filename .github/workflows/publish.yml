name: Publish to npm

# Publishes docupass-react-native to npm when a version tag (v*) is pushed.
#
# Required repository secret:
#   NPM_TOKEN  - an npm automation/granular access token with publish rights.
#                (Create at npmjs.com -> Access Tokens -> Generate New Token ->
#                 "Automation". For the first publish the token's owner must be
#                 allowed to create the package name.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install + build
        run: |
          npm install
          npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
