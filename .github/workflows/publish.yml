name: Publish to npm

# Publishes docupass-react-native to npm when a version tag (v*) is pushed, using
# npm Trusted Publishing (OIDC). No npm token is required.
#
# ONE-TIME SETUP ON npmjs.com (no secret needed):
#   npmjs.com -> Trusted Publisher (for the docupass-react-native package /
#   the new name) -> GitHub Actions:
#     Organization/User = idanalyzer
#     Repository        = docupass-react-native
#     Workflow filename = publish.yml
#     Environment       = (leave blank)
#   Then push a matching version tag, for example v0.2.0. If npm requires the
#   package to exist before a trusted publisher can be attached, do one manual
#   `npm publish` to create it first. This workflow handles later releases.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install + build
        run: |
          npm install
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $VERSION"
            exit 1
          fi
          npm run typecheck
          npm run build
          npm pack --dry-run

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish (OIDC, no token)
        run: npm publish --provenance --access public
