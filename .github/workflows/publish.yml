name: Publish to npm

# Publishes docupass-react-native to npm when a version tag (v*) is pushed, using
# npm Trusted Publishing (OIDC) — NO token, same setup as idanalyzer2.
#
# ONE-TIME SETUP ON npmjs.com (no secret needed):
#   npmjs.com -> Trusted Publisher (for the docupass-react-native package /
#   the new name) -> GitHub Actions:
#     Organization/User = idanalyzer
#     Repository        = docupass-react-native
#     Workflow filename = publish.yml
#     Environment       = (leave blank)
#   Then push tag v0.1.0. (If npm requires the package to exist before a trusted
#   publisher can be attached, do one manual `npm publish` to create it, then this
#   workflow handles every release after — exactly like the idanalyzer2 flow.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install + build
        run: |
          npm install
          npm run build

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Publish (OIDC, no token)
        run: npm publish --provenance --access public
